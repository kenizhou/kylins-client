<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mailclient</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        display: grid;
        place-items: center;
        font-family:
          'Inter Variable',
          'Inter',
          -apple-system,
          'Segoe UI',
          'PingFang SC',
          'Microsoft YaHei',
          'Noto Sans SC',
          system-ui,
          sans-serif;
        background: oklch(0.205 0.012 258);
        color: oklch(0.935 0.006 258);
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid oklch(0.335 0.016 258);
        border-top-color: oklch(0.7 0.15 280);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
  </body>
</html>
