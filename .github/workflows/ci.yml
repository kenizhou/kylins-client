name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type-check + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kylins.client.frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kylins.client.frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npx vitest run

  backend:
    name: Backend (check + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kylins.client.backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kylins.client.backend

      - name: Install Linux deps (WebKit2GTK for Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Clippy
        # FIXME: re-enable -D warnings after fixing 6 pre-existing clippy issues
        run: cargo clippy --all-targets

      - name: Test (skip accounts — needs DBus keyring)
        run: cargo test -- --skip db::accounts::tests::
