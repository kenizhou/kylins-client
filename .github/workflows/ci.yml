name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type-check + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kylins.client.frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kylins.client.frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npx vitest run

  backend:
    name: Backend (check + fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kylins.client.backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kylins.client.backend

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test -- --skip accounts::tests

  notify:
    name: Notify
    needs: [frontend, backend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        if: env.SMTP_HOST
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Kylins CI] ${{ needs.frontend.result == 'success' && needs.backend.result == 'success' && 'SUCCESS' || 'FAILURE' }} — ${{ github.ref_name }}"
          to: kenizhou@hotmail.com
          from: Kylins CI <ci@kylins.app>
          body: |
            CI workflow completed for ${{ github.repository }} @ ${{ github.ref_name }}

            Commit: ${{ github.sha }}
            Frontend: ${{ needs.frontend.result }}
            Backend: ${{ needs.backend.result }}

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
